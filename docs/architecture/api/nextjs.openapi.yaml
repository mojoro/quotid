openapi: 3.1.0
info:
  title: Quotid Next.js API
  version: 0.1.0
  description: |
    HTTP endpoints served by Next.js Route Handlers under `/api/*`. Two
    audiences:

    1. **Browser (TanStack Query)** — reads `/api/journal-entries` and
       `/api/call-schedules`. Mutations happen via Server Actions (see
       `docs/architecture/api/server-actions.md`), not these routes.
    2. **Twilio** — posts call lifecycle events to
       `/api/webhooks/twilio/call-status` (watchdog; see
       `docs/architecture/temporal-workflow.md` §5).

    **Naming convention:** JSON property names use `snake_case` per Zalando
    guidelines (MUST rule). A boundary codec in Next.js transforms Prisma's
    camelCase client output to snake_case on response. Exception: the
    Twilio statusCallback request body is PascalCase because Twilio controls
    that contract.

    **Not for external API consumers.** No stability commitment; no
    public versioning strategy.
  contact:
    name: Quotid
    url: https://github.com/your-username/quotid

servers:
  - url: https://quotid.example.com/api
    description: Production.
  - url: http://localhost:3000/api
    description: Local dev.

tags:
  - name: auth
    description: Session lifecycle (login / logout). Single-user MVP, passcode-on-User.
  - name: journal-entries
    description: User-facing journal data.
  - name: call-schedules
    description: When the user wants to be called.
  - name: call-sessions
    description: Live-call control surface (transcript polling, hangup).
  - name: voice
    description: TTS voice preview (settings page audition).
  - name: webhooks
    description: Inbound webhooks from external services.

paths:
  /auth/login:
    post:
      tags: [auth]
      summary: Exchange a passcode for a session cookie.
      description: |
        Single-user MVP. The `User` table carries a `passcode_hash` column
        (argon2id, see `prisma/schema.prisma`). The handler:

        1. Looks up the sole user row (MVP single-user assumption — the
           query is `SELECT 1 FROM users LIMIT 1`; the user is the
           passcode-bearer).
        2. Verifies the submitted passcode against `passcode_hash`.
        3. On match: generates a 32-byte URL-safe random session token,
           inserts a `Session` row keyed by that token (TTL 30 days,
           sliding-window refreshed on use), sets the `quotid_session`
           cookie (`HttpOnly`, `Secure`, `SameSite=Lax`, `Path=/`,
           `Max-Age=2592000`).
        4. Returns 204 No Content. The client follows up with a redirect
           to `/` (the journal list) — performed client-side by the form
           submission handler, not by this endpoint.

        **Rate limiting:** 5 attempts per IP per 15 minutes (in-process
        token bucket; sufficient for single-user MVP). On exhaustion the
        endpoint returns `429` with `Retry-After`. Argon2id verification
        cost (~100 ms) is the primary brute-force defense; the rate limit
        protects against argon2 DoS, not credential stuffing.

        **Public.** No `security` requirement. This is the entry point.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
          application/x-www-form-urlencoded:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '303':
          description: |
            Login outcome. Browser follows the `Location` header.
            On success, the response carries `Set-Cookie: quotid_session=...` and
            Location is `/journal-entries` (or the `next` query param if provided).
            On failure (invalid passcode, missing field, no user, rate-limited),
            Location is `/login?error=<code>` where `<code>` is one of
            `invalid` | `missing` | `no-user` | `rate-limited`.
          headers:
            Set-Cookie:
              schema:
                type: string
                example: 'quotid_session=abc123...; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=2592000'
              description: Present only on success.
            Location:
              schema:
                type: string
                example: '/journal-entries'

  /auth/logout:
    post:
      tags: [auth]
      summary: Invalidate the current session and clear the cookie.
      description: |
        Idempotent. Even without a valid session cookie, the response is
        204 with `Set-Cookie` clearing `quotid_session`. The handler:

        1. Reads `quotid_session` from the request cookies.
        2. If present, deletes the matching `Session` row (no-op if the
           row was already expired and pruned).
        3. Sets `Set-Cookie: quotid_session=; Max-Age=0; Path=/` to clear
           the cookie regardless of whether step 2 found a row.

        No CSRF token required: logout is idempotent and the worst-case
        outcome of a CSRF-triggered logout is the user signing back in.
      operationId: logout
      security:
        - sessionCookie: []
        - {}
      responses:
        '204':
          description: |
            Session cleared. `Set-Cookie: quotid_session=; Max-Age=0` is
            set on the response.
          headers:
            Set-Cookie:
              schema:
                type: string
                example: 'quotid_session=; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=0'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /journal-entries:
    get:
      tags: [journal-entries]
      summary: List journal entries for the authenticated user.
      description: |
        Cursor-paginated. Default sort is `entry_date desc, created_at desc`.

        **Cursor encoding (opaque to clients; documented here for
        implementers):** the cursor encodes the full compound sort key
        `(sort_field_value, id)`, base64-encoded. `id` is the tie-breaker
        needed when two rows share the same `sort_field_value` (e.g., two
        entries on the same `entry_date`). Implementation: Prisma's
        `cursor: { id: ... }` alone is NOT sufficient; use a
        `(sort_field_value, id) > cursor.tuple` WHERE clause via Prisma
        raw SQL or a compound-index-aware query. Without the tie-breaker,
        rows at page boundaries get skipped or duplicated.

        Full-text / substring filtering is not supported in this version;
        the journal UI is chronological scroll only. (A `q` param may be
        added later once there's enough data to justify the pg_trgm GIN
        index work.)
      operationId: listJournalEntries
      security:
        - sessionCookie: []
      parameters:
        - name: cursor
          in: query
          required: false
          description: |
            Opaque cursor token. Returned as `next_cursor` on the previous
            page; absent / null indicates the end of results.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Page size. Capped at 100 server-side.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort
          in: query
          required: false
          description: Sort axis. Only two options for MVP.
          schema:
            type: string
            enum: [entry_date, created_at]
            default: entry_date
      responses:
        '200':
          description: Paginated page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryPage'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /journal-entries/{id}:
    get:
      tags: [journal-entries]
      summary: Fetch a single journal entry.
      operationId: getJournalEntry
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/EntryIdPath'
      responses:
        '200':
          description: The entry.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JournalEntry' }
        default:
          $ref: '#/components/responses/ProblemResponse'

  /call-schedules:
    get:
      tags: [call-schedules]
      summary: Get the authenticated user's call schedule.
      description: |
        Returns a list for API-shape consistency, but MVP is single-user with
        one schedule row — the list will always be 0 or 1 entries. Mutations
        go through the `updateCallSchedule` Server Action.
      operationId: listCallSchedules
      security:
        - sessionCookie: []
      responses:
        '200':
          description: List of call schedules (0 or 1 items in MVP).
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/CallSchedule' }
        default:
          $ref: '#/components/responses/ProblemResponse'

  /call-sessions/{id}/transcript:
    get:
      tags: [call-sessions]
      summary: Live transcript of an in-progress call.
      description: |
        Browser-side polling endpoint for the live-call UI. The handler
        looks up the `CallSession` (auth-gated by `userId`), reads its
        `twilio_call_sid`, and proxies to the bot's
        `GET /calls/{call_sid}/transcript` over the internal Docker
        network (`BOT_INTERNAL_URL`).

        Returns `{segments: []}` (200) when the call has no
        `twilio_call_sid` yet (still PENDING) or when the bot has already
        torn down the in-memory collector. The empty-segments shape is
        intentional — the UI treats it the same as "nothing said yet" so
        polling stays simple.

        **Auth:** session cookie via `proxy.ts` (`x-user-id` header).
      operationId: getCallSessionTranscript
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/CallSessionIdPath'
      responses:
        '200':
          description: Live transcript snapshot (possibly empty).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiveTranscript' }
        '401':
          description: No authenticated session.
        '404':
          description: CallSession not found or not owned by the user.
        '503':
          description: '`BOT_INTERNAL_URL` not configured on the server.'

  /call-sessions/{id}/end:
    post:
      tags: [call-sessions]
      summary: Hang up an in-progress call.
      description: |
        Triggered by the "End call" button in the live-call UI. The handler
        verifies the `CallSession` is owned by the user and currently in
        a terminable state (`DIALING` or `IN_PROGRESS`), then proxies to
        the bot's `POST /calls/{call_sid}/end` over `BOT_INTERNAL_URL`.

        The bot in turn asks Twilio to mark the call `completed` and
        fails the workflow's `await-call` activity directly (see
        `pipecat-bot.openapi.yaml`).

        **Auth:** session cookie via `proxy.ts` (`x-user-id` header).
      operationId: endCallSession
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/CallSessionIdPath'
      responses:
        '200':
          description: Hangup acknowledged. Body `{ok: true}`.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                additionalProperties: false
                properties:
                  ok: { type: boolean, const: true }
        '401':
          description: No authenticated session.
        '404':
          description: CallSession not found or not owned by the user.
        '409':
          description: |
            Call cannot be terminated — either no Twilio call has been
            placed yet (`twilio_call_sid` null) or the session is already
            in a terminal state (`COMPLETED` / `FAILED` / `NO_ANSWER`).
        '502':
          description: Bot proxy returned a non-2xx; the bot's status / body is propagated.
        '503':
          description: '`BOT_INTERNAL_URL` not configured on the server.'

  /voice-preview:
    get:
      tags: [voice]
      summary: Stream a short TTS sample of a Deepgram Aura voice.
      description: |
        Settings page lets the user audition each available Aura 2 voice
        before selecting it. The handler proxies a fixed preview sentence
        through Deepgram's `/v1/speak` endpoint and streams the audio body
        back to the browser as `audio/mpeg`.

        Cached browser-side for 24h (`Cache-Control: private, max-age=86400`)
        — the preview text and voice catalogue are static.

        The list of permitted voice IDs is enforced server-side; requests
        for a voice outside the allowlist are rejected with 400. The
        canonical list lives in `app/(app)/settings/voices.ts` and is
        currently:
        `aura-2-thalia-en`, `aura-2-orion-en`, `aura-2-luna-en`,
        `aura-2-aries-en`, `aura-2-draco-en`, `aura-2-iris-en`.

        **Auth:** session cookie via the proxy — the Route Handler reads
        `x-user-id` injected by `proxy.ts`. There is no separate auth
        header.
      operationId: getVoicePreview
      security:
        - sessionCookie: []
      parameters:
        - name: voice
          in: query
          required: true
          description: |
            Deepgram Aura 2 model ID. Must be one of the allowlisted IDs;
            unknown values return 400.
          schema:
            type: string
            enum:
              - aura-2-thalia-en
              - aura-2-orion-en
              - aura-2-luna-en
              - aura-2-aries-en
              - aura-2-draco-en
              - aura-2-iris-en
      responses:
        '200':
          description: MP3 audio of the preview sentence.
          headers:
            Content-Type:
              schema: { type: string, example: 'audio/mpeg' }
            Cache-Control:
              schema: { type: string, example: 'private, max-age=86400' }
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '400':
          description: '`voice` query param missing or not in the allowlist.'
        '401':
          description: No authenticated session (no `x-user-id` header from proxy).
        '502':
          description: Deepgram returned a non-2xx status; that status is propagated.
        '503':
          description: '`DEEPGRAM_API_KEY` not configured on the server.'

  /webhooks/twilio/call-status:
    post:
      tags: [webhooks]
      summary: Twilio statusCallback — watchdog + live-state writer.
      description: |
        Triggered by Twilio on every call lifecycle event. The handler
        branches on `(CallStatus, AnsweredBy)` to decide whether to write
        state. Twilio's Answering Machine Detection (AMD) is enabled on
        the outbound call (`machine_detection=Enable`), so `AnsweredBy`
        accompanies the `completed` event — distinguishing voicemail
        pickup (where Pipecat never engages) from a real human conversation
        (where Pipecat is the authoritative completer).

        | `CallStatus` | `AnsweredBy` | Effect |
        |---|---|---|
        | `in-progress` | any | Flip `CallSession` `DIALING`/`PENDING` → `IN_PROGRESS` and stamp `started_at`. Temporal not notified. |
        | `completed` | `machine_*` / `fax` | Voicemail pickup — `/twiml` returned `<Hangup/>`, no WSS. Complete `await-call` with `NO_ANSWER`. |
        | `completed` | `human` / `unknown` / unset | **No-op.** The bot's WSS handler is the authoritative completion path. |
        | `no-answer` / `failed` / `busy` / `canceled` | any | Complete `await-call` with `FAILED` or `NO_ANSWER` (per `STATUS_MAP`). |
        | `queued` / `ringing` | any | No-op (observational only). |

        Why the human-pickup no-op matters: the bot's WSS handler builds a
        full outcome (transcript + recording) via Twilio API round-trips
        before completing the activity. The webhook fires `completed` the
        instant Twilio's leg ends — racing the bot. If the webhook fired
        unconditionally, it would stomp the bot's outcome and route the
        workflow through `handle_missed_call`, dropping the journal entry.

        The handler must return 200 fast (< 15 s) to keep Twilio from
        retrying; all work happens synchronously but is kept minimal
        (DB lookup + one Temporal client call).

        **Public.** Authenticated via `X-Twilio-Signature`.

        **Note on body casing:** Twilio sends form-encoded PascalCase field
        names (`CallSid`, `CallStatus`, `AnsweredBy`). This is Twilio's
        contract; we can't change it. All *other* request/response bodies
        in this API are snake_case per the convention above.
      operationId: twilioCallStatus
      security:
        - twilioSignature: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: { $ref: '#/components/schemas/TwilioStatusCallback' }
      responses:
        '200':
          description: Acknowledgment. Body empty.
        default:
          $ref: '#/components/responses/ProblemResponse'

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: quotid_session
      description: |
        Opaque session ID, issued after passcode login (see MVP auth design).
        Validated by Next.js middleware; Server Actions and these Route
        Handlers both read it via `cookies()`.
    twilioSignature:
      type: apiKey
      in: header
      name: X-Twilio-Signature
      description: |
        HMAC-SHA1 of request URL + sorted form body, keyed by Twilio auth
        token. Validated with the Twilio Node SDK's `validateRequest`.

  parameters:
    EntryIdPath:
      name: id
      in: path
      required: true
      description: JournalEntry cuid v1 ID.
      schema:
        type: string
        minLength: 20
        maxLength: 40
    CallSessionIdPath:
      name: id
      in: path
      required: true
      description: CallSession cuid v1 ID.
      schema:
        type: string
        minLength: 20
        maxLength: 40

  responses:
    ProblemResponse:
      description: Error — see status code and problem object for details.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }

  schemas:
    LoginRequest:
      type: object
      required: [passcode]
      additionalProperties: false
      properties:
        passcode:
          type: string
          minLength: 6
          maxLength: 128
          description: |
            Pre-shared passcode. Verified server-side against the user's
            `passcode_hash` (argon2id). Length bounds prevent zero-length
            and pathological-length inputs from reaching the verifier.

    JournalEntry:
      type: object
      required:
        [id, user_id, title, body, generated_body, is_edited, entry_date, created_at, updated_at]
      additionalProperties: false
      properties:
        id:
          type: string
          description: cuid v1 (25 chars).
        user_id:
          type: string
        call_session_id:
          type: [string, 'null']
          description: Null iff the entry was created without an associated call (e.g., manual entry — not in MVP).
        title:
          type: string
          minLength: 1
          maxLength: 200
        body:
          type: string
          description: Current text. Edited by the user via `updateJournalEntry` action.
        generated_body:
          type: string
          description: Original LLM output. Frozen at creation; preserved across user edits.
        is_edited:
          type: boolean
          description: True iff `body` has diverged from `generated_body`.
        entry_date:
          type: string
          format: date
          description: 'The date the entry is *about* (e.g., "yesterday"), not when it was generated.'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    JournalEntryPage:
      type: object
      required: [items, next_cursor]
      additionalProperties: false
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/JournalEntry' }
        next_cursor:
          type: [string, 'null']
          description: Opaque cursor for the next page; `null` when no more pages.

    CallSchedule:
      type: object
      required:
        [id, user_id, local_time_of_day, enabled, created_at, updated_at]
      additionalProperties: false
      properties:
        id:
          type: string
        user_id:
          type: string
        local_time_of_day:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: 24-hour HH:MM in the user's configured timezone.
          example: '21:00'
        enabled:
          type: boolean
        temporal_schedule_id:
          type: [string, 'null']
          description: |
            Temporal Schedule resource ID (form `journal:{user_id}`). Null
            only transiently — set on first successful sync.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TwilioStatusCallback:
      description: |
        Subset of Twilio's `statusCallback` payload that we use. Full
        reference: https://www.twilio.com/docs/voice/api/call-resource#statuscallback-events

        **Casing exception:** PascalCase because Twilio controls the wire
        format. All other Quotid API schemas use snake_case.
      type: object
      required: [CallSid, CallStatus, AccountSid]
      additionalProperties: true
      properties:
        CallSid:
          type: string
          pattern: '^CA[a-fA-F0-9]{32}$'
        CallStatus:
          type: string
          enum:
            [queued, ringing, in-progress, completed, busy, no-answer, failed, canceled]
          description: |
            Branching is on `(CallStatus, AnsweredBy)`; see operation
            description for the full table.
        AnsweredBy:
          type: string
          enum:
            [human, machine_start, machine_end_beep, machine_end_silence, machine_end_other, fax, unknown]
          description: |
            Twilio AMD result. Sent on `completed` (and sometimes earlier)
            because the outbound call was created with
            `machine_detection=Enable`. The handler treats `machine_*` /
            `fax` as voicemail pickup (complete the activity as
            `NO_ANSWER`); `human` / `unknown` / unset means a real
            conversation happened — leave completion to the bot's WSS.
        CallDuration:
          type: string
          description: Integer seconds as a string (Twilio form-encodes everything).
        AccountSid:
          type: string
        From:
          type: string
        To:
          type: string

    LiveTranscript:
      type: object
      required: [segments]
      additionalProperties: false
      description: |
        In-memory chronological transcript for an active call. Empty
        `segments` is a valid response (call still PENDING, or pipeline
        already torn down).
      properties:
        segments:
          type: array
          items:
            type: object
            required: [speaker, text]
            additionalProperties: false
            properties:
              speaker:
                type: string
                description: '`assistant` for bot turns, `user` for caller turns.'
              text:
                type: string

    ProblemDetails:
      description: |
        RFC 9457 Problem Details (obsoletes RFC 7807). Field names are
        standardized by the RFC; `trace_id` is a Quotid-specific extension.
      type: object
      required: [type, title, status]
      additionalProperties: true
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
        trace_id:
          type: string
          description: Server-side trace ID for debugging. Quotid extension.
