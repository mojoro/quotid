openapi: 3.1.0
info:
  title: Quotid Pipecat Bot Server
  version: 0.1.0
  description: |
    Python FastAPI service that bridges Temporal to Twilio and runs the per-call
    Pipecat pipeline (STT → LLM → TTS). REST endpoints listed below plus a
    WebSocket endpoint (documented in `docs/architecture/api/README.md` §4 —
    WebSockets don't fit OpenAPI).

    **Topology:** runs inside the AWS Lightsail VM's Docker network. Caddy
    exposes `/calls/{call_sid}/twiml` and `/calls/{call_sid}/stream` publicly
    because Twilio must reach them; `POST /calls`, `GET /calls/{call_sid}`,
    `GET /calls/{call_sid}/transcript`, and `POST /calls/{call_sid}/end` are
    internal-only (Caddy matcher blocks external access — see the Caddyfile
    and the "Caddy 403s public POST `/calls`" invariant in `CLAUDE.md`).

    **Status-callback orientation (out of scope here):** Twilio's
    `statusCallback` events post to the *web app*, not this bot — see
    `nextjs.openapi.yaml` `/webhooks/twilio/call-status`. That webhook is
    what advances the workflow on abnormal call outcomes (no-answer / busy
    / voicemail). The bot's job on the happy path is to run the WSS
    pipeline and complete the `await-call` activity itself.

    **Naming convention:** JSON property names use `snake_case` per Zalando
    guidelines. Path segments use kebab-case. `operationId` values use
    camelCase (tooling convention, not a wire-format field).
  contact:
    name: Quotid
    url: https://github.com/your-username/quotid

servers:
  - url: http://bot:8000
    description: Docker-network internal URL (used by Temporal worker as `BOT_INTERNAL_URL`).
  - url: https://v.quotid.johnmoorman.com
    description: Public URL via Caddy (only `/twiml` and `/stream` reachable).

tags:
  - name: calls
    description: Outbound call lifecycle.
  - name: twilio
    description: Endpoints called by Twilio's platform, not by our code.

paths:
  /calls:
    post:
      tags: [calls]
      summary: Initiate an outbound call.
      description: |
        Invoked by the Temporal worker's `initiate_call` activity. Creates a
        Twilio outbound call (`twilio.calls.create`) pointed at the TwiML
        endpoint below, stashes the `workflow_id` + `activity_id` so Pipecat
        can async-complete the corresponding Temporal activity on session end.

        Server-side, the call is created with `machine_detection="Enable"`
        and dual-channel recording. AMD adds ~3 s of pre-TwiML latency and
        ~$0.0075/call but lets `/twiml` short-circuit voicemail pickups
        with `<Hangup/>` instead of dumping a journaling prompt into
        someone's mailbox. AMD is server-side only — clients don't pass
        anything related to it.

        On Twilio rejection, the response status mirrors Twilio's HTTP
        status (4xx / 5xx) and the body's `detail` carries the Twilio
        error message. This lets the worker classify retryability
        correctly — bare-throwing as 500 would burn the worker's retry
        budget on permanent rejections (unverified destination,
        suspended account, etc.).

        **Internal only.** Caddy denies external traffic to this path.
      operationId: createCall
      security:
        - internalNetwork: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCallRequest'
            examples:
              typical:
                value:
                  workflow_id: journal-user_abc123-2026-04-24T21:00:00Z
                  activity_id: await-call
                  call_session_id: cs_01HR9VXYZ456
                  to_phone: '+14155551234'
      responses:
        '202':
          description: |
            Call placed with Twilio. The Twilio call is dialing asynchronously;
            the actual ringing/answering is observed via the Twilio status
            callback webhook hitting the Next app.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCallResponse'
        default:
          description: Error — see status code and problem object.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }

  /calls/{call_sid}:
    get:
      tags: [calls]
      summary: Inspect current call state (ops / debug).
      description: |
        In-memory state of an active call as Pipecat sees it. Returns 404 once
        the pipeline has torn down — source of truth for post-call state is
        the `call_sessions` DB row, not this endpoint.

        **Internal only.**
      operationId: getCall
      security:
        - internalNetwork: []
      parameters:
        - $ref: '#/components/parameters/CallSidPath'
      responses:
        '200':
          description: Call state snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallState'
        default:
          description: Error — see status code and problem object.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }

  /calls/{call_sid}/transcript:
    get:
      tags: [calls]
      summary: Live transcript snapshot for an active call.
      description: |
        Returns the in-memory chronological transcript collected by the
        running Pipecat pipeline. The web app proxies this for its
        live-call UI (see `nextjs.openapi.yaml`
        `/call-sessions/{id}/transcript`).

        Empty `segments` is a valid response — it means either the
        pipeline hasn't started yet (WSS not connected) or it has already
        torn down (call finalized; collector removed). Source of truth
        for finalized transcripts is the `transcripts` DB row, not this
        endpoint.

        **Internal only.**
      operationId: getCallTranscript
      security:
        - internalNetwork: []
      parameters:
        - $ref: '#/components/parameters/CallSidPath'
      responses:
        '200':
          description: Live transcript (possibly empty).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveTranscriptResponse'
        default:
          description: Error — see status code and problem object.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }

  /calls/{call_sid}/end:
    post:
      tags: [calls]
      summary: Hang up an active call on user request.
      description: |
        Asks Twilio to mark the call `completed`
        (`twilio.calls(call_sid).update(status="completed")`) AND fails
        the workflow's `await-call` activity directly with reason
        `user_ended`.

        The dual action is intentional: if the WSS never opened (e.g. AMD
        flagged the call as voicemail and `/twiml` returned `<Hangup/>`,
        or the user pressed "End call" before the bot greeted), nobody
        else will ever complete the activity. Without the explicit
        `fail_await_call`, the workflow would hang for the full
        `start_to_close` timeout (~20 minutes) before the backstop fires.

        Returns 404 if the `call_sid` isn't in the in-process correlation
        registry (already finalized or never registered).

        **Internal only.**
      operationId: endCall
      security:
        - internalNetwork: []
      parameters:
        - $ref: '#/components/parameters/CallSidPath'
      responses:
        '202':
          description: Hangup accepted. Body `{ok: true}`.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                additionalProperties: false
                properties:
                  ok: { type: boolean, const: true }
        default:
          description: Error — see status code and problem object.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }

  /calls/{call_sid}/twiml:
    get:
      tags: [twilio]
      summary: Return TwiML instructing Twilio to open the Media Stream.
      description: |
        Twilio fetches this after accepting the call. Response is XML, not JSON.

        Branches on Twilio's AMD result (`AnsweredBy` form field, present
        because the outbound call was created with
        `machine_detection=Enable`):

        - `human` / `unknown` / unset → `<Response><Connect><Stream url="wss://.../calls/{call_sid}/stream"/></Connect></Response>`
        - `machine_*` / `fax` → `<Response><Hangup/></Response>` so the bot
          doesn't pour a journaling prompt into voicemail. The follow-up
          `completed` status callback (received by the web app) finalizes
          the workflow as `NO_ANSWER`.

        **Public.** Authenticated via Twilio signature (`X-Twilio-Signature` header).
      operationId: getCallTwiml
      security:
        - twilioSignature: []
      parameters:
        - $ref: '#/components/parameters/CallSidPath'
      responses:
        '200':
          description: TwiML XML.
          content:
            text/xml:
              schema:
                type: string
              example: |
                <?xml version="1.0" encoding="UTF-8"?>
                <Response>
                  <Connect>
                    <Stream url="wss://quotid.example.com/calls/CA1234.../stream"/>
                  </Connect>
                </Response>
        default:
          description: Error — see status code and problem object.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }

components:
  securitySchemes:
    internalNetwork:
      type: apiKey
      in: header
      name: X-Internal-Auth
      description: |
        Not a real API key. This scheme signals "access requires being on the
        Docker network." Enforced by Caddy's request matcher, not by the
        FastAPI app. Declared here so tooling understands these endpoints
        aren't internet-facing.
    twilioSignature:
      type: apiKey
      in: header
      name: X-Twilio-Signature
      description: |
        HMAC-SHA1 of the request URL + sorted form body, keyed by the Twilio
        auth token. Validated with the `twilio` Python SDK's
        `RequestValidator.validate(url, params, signature)`.

  parameters:
    CallSidPath:
      name: call_sid
      in: path
      required: true
      description: Twilio Call SID (`CA` + 32 hex chars).
      schema:
        type: string
        pattern: '^CA[a-fA-F0-9]{32}$'
        example: CA1234567890abcdef1234567890abcdef

  schemas:
    CreateCallRequest:
      type: object
      required: [workflow_id, activity_id, call_session_id, to_phone]
      additionalProperties: false
      properties:
        workflow_id:
          type: string
          description: |
            Temporal workflow ID of the `JournalingWorkflow` run that
            triggered this call. Used to construct the async activity handle
            for completion on session end.
          example: journal-user_abc123-2026-04-24T21:00:00Z
        activity_id:
          type: string
          description: |
            Temporal activity ID within the workflow. Hardcoded to
            `"await-call"` — see `docs/architecture/temporal-workflow.md` §5.
          const: await-call
        call_session_id:
          type: string
          description: Prisma `CallSession.id`. Used only for logging / correlation.
          example: cs_01HR9VXYZ456
        to_phone:
          type: string
          description: E.164-formatted phone number.
          pattern: '^\+[1-9]\d{6,14}$'
          example: '+14155551234'
        voice:
          type: [string, 'null']
          description: |
            Deepgram Aura voice model ID (e.g. `aura-2-thalia-en`).
            Optional — when null/omitted, the bot falls back to its
            configured default voice. Stored in the in-process
            correlation registry and consumed when the pipeline is built
            on WSS connect.
          example: aura-2-thalia-en
        user_name:
          type: [string, 'null']
          description: |
            User's display name. Optional — when null/omitted, the bot
            uses a generic greeting. Used both in the opening utterance
            and in the LLM system prompt for personalization.
          example: John

    CreateCallResponse:
      type: object
      required: [twilio_call_sid]
      additionalProperties: false
      properties:
        twilio_call_sid:
          type: string
          description: Twilio-assigned Call SID. Persisted to `call_sessions.twilio_call_sid`.
          pattern: '^CA[a-fA-F0-9]{32}$'
          example: CA1234567890abcdef1234567890abcdef

    LiveTranscriptResponse:
      type: object
      required: [segments]
      additionalProperties: false
      description: |
        In-memory chronological transcript for an active call. Empty
        `segments` is valid — pipeline not started yet, or already torn down.
      properties:
        segments:
          type: array
          items:
            type: object
            required: [speaker, text]
            additionalProperties: false
            properties:
              speaker:
                type: string
                description: '`assistant` for bot turns, `user` for caller turns.'
              text:
                type: string

    CallState:
      type: object
      required: [call_sid, workflow_id, status, started_at]
      additionalProperties: false
      properties:
        call_sid:
          type: string
          pattern: '^CA[a-fA-F0-9]{32}$'
        workflow_id:
          type: string
        call_session_id:
          type: string
        status:
          type: string
          enum: [dialing, connected, ended]
          description: |
            In-memory view of the pipeline state. Not the same enum as
            `CallStatus` in the DB — this is Pipecat's live pipeline state,
            which is finer-grained than the persisted call-attempt status.
        started_at:
          type: string
          format: date-time
        turn_count:
          type: integer
          minimum: 0
          description: Number of completed user-assistant turns so far.

    ProblemDetails:
      description: |
        RFC 9457 Problem Details (obsoletes RFC 7807). Zalando-compliant
        error envelope. Field names are standardized by the RFC and kept
        as defined; `trace_id` is a Quotid-specific extension.
      type: object
      required: [type, title, status]
      additionalProperties: true
      properties:
        type:
          type: string
          format: uri
          description: URI reference identifying the problem type.
          default: about:blank
        title:
          type: string
          description: Short, human-readable summary.
        status:
          type: integer
          description: HTTP status code.
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri
          description: URI reference identifying this specific occurrence.
        trace_id:
          type: string
          description: Server-side trace ID for debugging. Quotid extension.
      example:
        type: https://errors.quotid.example.com/invalid-phone
        title: Invalid phone number
        status: 400
        detail: 'to_phone must be E.164: expected +[1-9]\d{6,14}, got "415-555-1234".'
        instance: /calls
